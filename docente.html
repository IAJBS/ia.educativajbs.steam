<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Docente - Ciencia y Tecnología</title>
  <link rel="stylesheet" href="css/docente.css">
</head>

<body>

<!-- ======================================================
     HEADER DOCENTE
====================================================== -->
<header class="header">
  <div class="header-contenido">

    <!-- INSIGNIA -->
    <img src="img/insignia.png" alt="Insignia" class="insignia">

    <!-- COLEGIO -->
    <div class="titulo-colegio">
      <h1>I.E.P. José Buenaventura Sepúlveda Fernández</h1>
      <p>Panel de configuración docente</p>
    </div>

    <!-- ICONO -->
    <div class="docente-icono">
      👩‍🏫
    </div>

  </div>
</header>

<!-- ======================================================
     CONTENIDO
====================================================== -->
<main class="contenedor">

  <section class="card">
    <h2>Configurar sesión de aprendizaje</h2>

    <p>Sección:</p>
    <input type="text" id="seccionDocente" placeholder="Ejemplo: 2° A">

    <p>Tema del día:</p>
    <input type="text" id="temaDocente" placeholder="Ejemplo: Método científico">

    <button onclick="activarClase()">Activar clase</button>

    <p id="estado" class="estado"></p>
  </section>

</main>

<footer class="footer">
  <p>Plataforma educativa con Inteligencia Artificial</p>
</footer>

<!-- ======================================================
     SCRIPT DOCENTE
====================================================== -->
<script>
function activarClase() {
  const seccion = document.getElementById("seccionDocente").value.trim();
  const tema = document.getElementById("temaDocente").value.trim();
  const estado = document.getElementById("estado");

  if (!seccion || !tema) {
    alert("Completa todos los campos");
    return;
  }

  // CLAVES ÚNICAS DEL SISTEMA
  localStorage.setItem("cyt_seccion_activa", seccion);
  localStorage.setItem("cyt_tema_activo", tema);

  estado.textContent =
    "✅ Clase activada para la sección " + seccion +
    " con el tema: " + tema;
}
</script>

</body>
</html>
