<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Docente</title>
  <link rel="stylesheet" href="css/docente.css">
</head>

<body>

<header class="header">
  <div class="header-contenido">
    <img src="img/insignia.png" class="insignia">
    <div class="titulo-colegio">
      <h1>I.E.P. José Buenaventura Sepúlveda Fernández</h1>
      <p>Panel Docente</p>
    </div>
    <div class="docente-icono">👩‍🏫</div>
  </div>
</header>

<main class="contenedor">

  <section class="card">
    <h2 id="bienvenida">Bienvenido/a</h2>
  </section>

  <!-- FORMULARIO DE CLASE -->
  <section class="card">
    <h2>Registrar clase</h2>

    <select id="grado">
      <option value="">Seleccione grado</option>
      <option>1°</option><option>2°</option><option>3°</option>
      <option>4°</option><option>5°</option>
    </select>

    <select id="seccion">
      <option value="">Seleccione sección</option>
      <option>A</option><option>B</option><option>C</option>
      <option>D</option><option>E</option><option>F</option>
      <option>G</option><option>H</option>
    </select>

    <input type="text" id="tema" placeholder="Tema">
    <input type="text" id="titulo" placeholder="Título de la clase">
    <textarea id="proposito" placeholder="Propósito de la clase"></textarea>
    <textarea id="criterios" placeholder="Criterios de evaluación"></textarea>
    <input type="file" id="archivo">

    <button id="guardarClase">Guardar clase</button>
  </section>

  <!-- TABLA -->
  <section class="card">
    <h2>Clases registradas</h2>
    <table>
      <thead>
        <tr>
          <th>Grado</th>
          <th>Sección</th>
          <th>Título</th>
          <th>Tema</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaClases"></tbody>
    </table>
  </section>

</main>

<footer class="footer">
  <p>Plataforma educativa con IA</p>
</footer>

<script src="js/docente.js"></script>
</body>
</html>
