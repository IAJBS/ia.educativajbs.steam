<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Docente - Ciencia y Tecnología</title>
  <link rel="stylesheet" href="css/docente.css">
</head>

<body>

<!-- ======================================================
     HEADER DOCENTE
====================================================== -->
<header class="header">
  <div class="header-contenido">

    <!-- INSIGNIA -->
    <img src="img/insignia.png" alt="Insignia" class="insignia">

    <!-- COLEGIO -->
    <div class="titulo-colegio">
      <h1>I.E.P. José Buenaventura Sepúlveda Fernández</h1>
      <p>Panel de configuración docente</p>
    </div>

    <!-- ICONO -->
    <div class="docente-icono">👩‍🏫</div>

  </div>
</header>

<!-- ======================================================
     CONTENIDO
====================================================== -->
<main class="contenedor">

  <section class="card">
    <h2>Configurar sesión de aprendizaje</h2>

    <p>Sección:</p>
    <input type="text" id="seccionDocente" placeholder="Ejemplo: 2° A">

    <p>Tema del día:</p>
    <input type="text" id="temaDocente" placeholder="Ejemplo: Método científico">

    <button onclick="activarClase()">Activar clase</button>
    <button class="btn-cerrar" onclick="cerrarClase()">Cerrar clase</button>

    <p id="estado" class="estado"></p>
  </section>

</main>

<footer class="footer">
  <p>Plataforma educativa con Inteligencia Artificial</p>
</footer>

<!-- ======================================================
     SCRIPT DOCENTE
====================================================== -->
<script>
const seccionInput = document.getElementById("seccionDocente");
const temaInput = document.getElementById("temaDocente");
const estado = document.getElementById("estado");

// 🔹 CARGAR CONFIGURACIÓN EXISTENTE
const seccionActiva = localStorage.getItem("cyt_seccion_activa");
const temaActivo = localStorage.getItem("cyt_tema_activo");

if (seccionActiva && temaActivo) {
  seccionInput.value = seccionActiva;
  temaInput.value = temaActivo;
  estado.textContent =
    "📘 Clase activa para la sección " + seccionActiva +
    " con el tema: " + temaActivo;
}

// 🔹 ACTIVAR CLASE
function activarClase() {
  const seccion = seccionInput.value.trim();
  const tema = temaInput.value.trim();

  if (!seccion || !tema) {
    alert("Completa todos los campos");
    return;
  }

  localStorage.setItem("cyt_seccion_activa", seccion);
  localStorage.setItem("cyt_tema_activo", tema);

  estado.textContent =
    "✅ Clase activada para la sección " + seccion +
    " con el tema: " + tema;
}

// 🔹 CERRAR CLASE
function cerrarClase() {
  localStorage.removeItem("cyt_seccion_activa");
  localStorage.removeItem("cyt_tema_activo");

  seccionInput.value = "";
  temaInput.value = "";

  estado.textContent = "⛔ No hay clase activa en este momento";
}
</script>

</body>
</html>
