<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Docente - Ciencia y Tecnología</title>
  <link rel="stylesheet" href="css/docente.css">
</head>

<body>

<header class="header">
  <div class="header-contenido">
    <img src="img/insignia.png" class="insignia">
    <div class="titulo-colegio">
      <h1>I.E.P. José Buenaventura Sepúlveda Fernández</h1>
      <p>Panel docente – Ciencia y Tecnología</p>
    </div>
    <div class="docente-icono">👩‍🏫</div>
  </div>
</header>

<main class="contenedor">

  <!-- REGISTRAR SECCIÓN -->
  <section class="card">
    <h2>Registrar sección</h2>
    <input type="text" id="seccionNueva" placeholder="Ejemplo: 2° A">
    <button onclick="agregarSeccion()">Agregar sección</button>
  </section>

  <!-- REGISTRAR TEMA -->
  <section class="card">
    <h2>Agregar tema</h2>
    <select id="seccionTema"></select>
    <input type="text" id="temaNuevo" placeholder="Ejemplo: Método científico">
    <button onclick="agregarTema()">Agregar tema</button>
  </section>

  <!-- ACTIVAR CLASE -->
  <section class="card">
    <h2>Activar clase del día</h2>
    <select id="seccionActiva"></select>
    <select id="temaActivo"></select>
    <button onclick="activarClase()">Activar clase</button>
    <p id="estado" class="estado"></p>
  </section>

</main>

<footer class="footer">
  <p>Plataforma educativa con IA</p>
</footer>

<script>
let data = JSON.parse(localStorage.getItem("cyt_docente")) || {};

function guardar() {
  localStorage.setItem("cyt_docente", JSON.stringify(data));
  cargarSelects();
}

function agregarSeccion() {
  const s = seccionNueva.value.trim();
  if (!s) return alert("Escribe una sección");
  if (!data[s]) data[s] = [];
  guardar();
}

function agregarTema() {
  const s = seccionTema.value;
  const t = temaNuevo.value.trim();
  if (!t) return alert("Escribe un tema");
  data[s].push(t);
  guardar();
}

function activarClase() {
  localStorage.setItem("cyt_seccion_activa", seccionActiva.value);
  localStorage.setItem("cyt_tema_activo", temaActivo.value);
  estado.textContent = "✅ Clase activada correctamente";
}

function cargarSelects() {
  [seccionTema, seccionActiva].forEach(sel => {
    sel.innerHTML = "";
    Object.keys(data).forEach(s => {
      sel.innerHTML += `<option>${s}</option>`;
    });
  });

  seccionActiva.onchange = () => {
    temaActivo.innerHTML = "";
    data[seccionActiva.value].forEach(t => {
      temaActivo.innerHTML += `<option>${t}</option>`;
    });
  };
  seccionActiva.onchange();
}

cargarSelects();
</script>

</body>
</html>
