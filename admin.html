<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin – Proyecto JBS</title>
  <link rel="stylesheet" href="docente.css">
</head>
<body>

  <!-- HEADER -->
  <header class="top-bar">
    <h1>Proyecto JBS</h1>
  </header>

  <!-- CONTENEDOR PRINCIPAL -->
  <main class="contenedor">

    <!-- LOGIN ADMIN -->
    <section id="login" class="panel">
      <h2>Iniciar sesión</h2>

      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="clave" placeholder="Contraseña">

      <button onclick="login()">Ingresar</button>
      <p id="error" class="error"></p>
    </section>

    <!-- PANEL ADMIN -->
    <section id="panel" class="panel oculto">

      <h2>Gestión de Docentes</h2>

      <!-- FORMULARIO -->
      <div class="formulario">
        <input type="text" id="dni" placeholder="DNI">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="email" id="correo" placeholder="Correo">
        <input type="text" id="celular" placeholder="Celular">

        <select id="area" onchange="verificarEPT()">
          <option value="">Seleccione área</option>
          <option value="Educación para el Trabajo">Educación para el Trabajo</option>
          <option value="Comunicación">Comunicación</option>
          <option value="Matemática">Matemática</option>
        </select>

        <select id="especialidadEPT" class="oculto">
          <option value="">Especialidad EPT</option>
          <option value="Computación">Computación</option>
          <option value="Electricidad">Electricidad</option>
          <option value="Mecánica">Mecánica</option>
        </select>

        <button onclick="agregarDocente()">Registrar docente</button>
      </div>

      <!-- TABLA -->
      <table>
        <thead>
          <tr>
            <th>DNI</th>
            <th>Nombre</th>
            <th>Área</th>
            <th>Especialidad</th>
            <th>Usuario</th>
            <th>Clave</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="listaDocentes"></tbody>
      </table>

    </section>

  </main>

  <!-- JS ADMIN (NO SE TOCA) -->
  <script src="admin.js"></script>

</body>
</html>
