<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tutor IA - Ciencia y Tecnología</title>
  <link rel="stylesheet" href="css/cyt.css">
</head>

<body class="bloqueado">

<!-- ================= MODAL ROL ================= -->
<div class="modal-rol" id="modalRol">
  <div class="modal-contenido">
    <h2>Selecciona tu rol</h2>
    <div class="botones-rol">
      <button onclick="ingresarComoDocente()">👩‍🏫 Docente</button>
      <button onclick="ingresarComoEstudiante()">🎓 Estudiante</button>
    </div>
  </div>
</div>

<header class="header">
  <div class="header-contenido">
    <div class="titulo-cyt">
      <h1>Ciencia y Tecnología</h1>
      <p>Tutor IA educativo</p>
    </div>
    <div class="ia-cyt">
      <span id="mensaje-cyt">Listo para aprender</span>
    </div>
  </div>
</header>

<main class="contenedor">

<!-- ================= INICIO ================= -->
<section class="bienvenida" id="inicio">
  <h2>Inicio</h2>
  <p><strong>Sección:</strong> <span id="seccionActiva"></span></p>
  <p><strong>Tema:</strong> <span id="temaActivo"></span></p>

  <input type="text" id="codigoInput" placeholder="Código del estudiante">
  <button onclick="iniciarSesion()">Iniciar</button>
</section>

<!-- ================= ACTIVACIÓN ================= -->
<section class="bienvenida" id="activacion" style="display:none;">
  <h2>Conocimientos previos</h2>

  <p>¿Qué sabes del tema?</p>
  <input type="text" id="idea1">

  <p>¿Dónde lo has visto?</p>
  <input type="text" id="idea2">

  <p>¿Qué te gustaría aprender?</p>
  <input type="text" id="idea3">

  <button onclick="continuarTutor()">Continuar</button>
</section>

<!-- ================= TUTOR IA ================= -->
<section class="bienvenida" id="tutor" style="display:none;">
  <h2>Tutor IA</h2>
  <p id="textoTutor"></p>

  <p><strong>Responde:</strong></p>
  <p id="preguntaTutor"></p>

  <input type="text" id="respuestaTutor">
  <button onclick="avanzarMetacognicion()">Continuar</button>
</section>

<!-- ================= METACOGNICIÓN ================= -->
<section class="bienvenida" id="metacognicion" style="display:none;">
  <h2>Metacognición</h2>

  <p>¿Qué aprendiste?</p>
  <input type="text" id="p1">

  <p>¿Qué fue difícil?</p>
  <input type="text" id="p2">

  <p>¿Cómo mejorarías?</p>
  <input type="text" id="p3">

  <button id="btnGuardar" disabled onclick="guardarRespuestas()">Guardar</button>
  <p id="timer"></p>
</section>

</main>

<!-- ================= SCRIPT ================= -->
<script>
/* ===== ROL ===== */
function ingresarComoDocente() {
  window.location.href = "docente.html";
}
function ingresarComoEstudiante() {
  modalRol.style.display = "none";
  document.body.classList.remove("bloqueado");
}

/* ===== VARIABLES ===== */
let codigoEstudiante = "";
const mensaje = document.getElementById("mensaje-cyt");

const seccion = localStorage.getItem("cyt_seccion_activa") || "—";
const tema = localStorage.getItem("cyt_tema_activo") || "—";

document.getElementById("seccionActiva").textContent = seccion;
document.getElementById("temaActivo").textContent = tema;

/* ===== BASE TUTOR ===== */
const tutorIA = {
  "Fotosíntesis": {
    texto: "La fotosíntesis permite a las plantas producir su alimento.",
    pregunta: "¿Por qué es importante la fotosíntesis?"
  },
  "Energía": {
    texto: "La energía es necesaria para producir cambios.",
    pregunta: "¿Qué tipo de energía usas más?"
  }
};

/* ===== FLUJO ===== */
function iniciarSesion() {
  codigoEstudiante = document.getElementById("codigoInput").value.trim();
  if (!codigoEstudiante) return alert("Ingresa tu código");

  inicio.style.display = "none";
  activacion.style.display = "block";
  mensaje.textContent = "Tema: " + tema;
}

function continuarTutor() {
  activacion.style.display = "none";
  tutor.style.display = "block";

  const data = tutorIA[tema] || {
    texto: "Este tema nos ayuda a comprender mejor la ciencia.",
    pregunta: "¿Qué aprendiste del tema?"
  };

  textoTutor.textContent = data.texto;
  preguntaTutor.textContent = data.pregunta;
}

function avanzarMetacognicion() {
  tutor.style.display = "none";
  metacognicion.style.display = "block";
}

/* ===== GUARDAR RESPUESTAS ===== */
function guardarRespuestas() {
  const registro = {
    codigo: codigoEstudiante,
    seccion,
    tema,
    activacion: {
      idea1: idea1.value,
      idea2: idea2.value,
      idea3: idea3.value
    },
    tutor: respuestaTutor.value,
    metacognicion: {
      p1: p1.value,
      p2: p2.value,
      p3: p3.value
    },
    fecha: new Date().toLocaleString()
  };

  const datos = JSON.parse(localStorage.getItem("cyt_respuestas")) || [];
  datos.push(registro);
  localStorage.setItem("cyt_respuestas", JSON.stringify(datos));

  alert("Respuestas guardadas correctamente");
  location.reload();
}

/* ===== TIMER ===== */
let segundos = 15;
const btn = document.getElementById("btnGuardar");
const timer = document.getElementById("timer");

const intervalo = setInterval(() => {
  timer.textContent = "Reflexiona " + segundos + " segundos...";
  segundos--;
  if (segundos < 0) {
    clearInterval(intervalo);
    btn.disabled = false;
    timer.textContent = "Ya puedes guardar";
  }
}, 1000);
</script>

</body>
</html>
